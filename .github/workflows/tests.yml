name: Pruebas pos-backend

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

defaults:
  run:
    working-directory: pos-backend

jobs:
  test:
    name: Jest
    runs-on: ubuntu-latest

    steps:
      - name: Descargar código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: npm
          cache-dependency-path: pos-backend/package-lock.json

      - name: Instalar dependencias
        run: npm install

      - name: Correr pruebas (Jest)
        run: npm test
